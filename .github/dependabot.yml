version: 2
updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      claude-sdk:
        patterns:
          - "@anthropic-ai/*"
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
